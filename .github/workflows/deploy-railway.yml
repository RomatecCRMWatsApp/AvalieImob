name: Deploy Railway

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )

    steps:
      - name: Validate deploy hook secret
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RAILWAY_DEPLOY_HOOK_URL"
            echo "Create it in GitHub repo settings before running this workflow."
            exit 1
          fi

      - name: Trigger Railway deploy hook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Railway deploy hook..."
          curl --fail --show-error --silent --location --request POST "$RAILWAY_DEPLOY_HOOK_URL"
          echo "Deploy hook triggered successfully."
