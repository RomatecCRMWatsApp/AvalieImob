<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AvalieImob - PTAM + Laudos com Áudio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
      background: #0f1419;
      color: #f1f5f9;
    }
    #root { min-height: 100vh; }
    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1419 0%, #1a2a3a 100%);
    }
    .content {
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #228B22;
      font-size: 48px;
      margin-bottom: 20px;
    }
    .status {
      color: #228B22;
      margin-top: 20px;
      font-size: 20px;
      padding: 10px;
    }
    .badge {
      display: inline-block;
      background: #228B22;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      margin: 10px 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="container">
      <div class="content">
        <h1>🎉 AvalieImob</h1>
        <p style="color: #94a3b8; font-size: 18px;">Sistema de PTAM com Transcrição de Áudio</p>
        
        <div style="margin-top: 40px;">
          <div class="badge">✅ Backend: Online</div>
          <div class="badge">✅ Database: Online</div>
          <div class="badge">🚀 Frontend: Desenvolvendo</div>
        </div>
        
        <p style="color: #228B22; margin-top: 40px; font-size: 16px;">
          Deploy realizado com sucesso em Railway! 🚀
        </p>
      </div>
    </div>
  </div>
</body>
</html>
